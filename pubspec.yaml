name: dmw
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+10

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  curved_navigation_bar: ^1.0.6
  dotted_border: ^2.1.0
  flutter:
    sdk: flutter
  logger: ^2.3.0
  paged_vertical_calendar: ^1.1.8
  pinput: ^5.0.0
  provider: ^6.1.2
  fluttertoast: ^8.2.8
  shared_preferences: ^2.2.3
  syncfusion_flutter_calendar: ^28.1.33
  http: ^1.2.2
  intl: ^0.18.1
  app_links: ^3.5.0
  razorpay_flutter: ^1.4.1
  firebase_core: ^4.6.0
  change_app_package_name: ^1.5.0
  firebase_auth: ^6.3.0
  share_plus: ^12.0.1
  url_launcher: ^6.3.0
  webview_flutter: ^4.13.1
  flutter_native_splash: ^2.4.0
  recaptcha_enterprise_flutter: ^18.8.2
  dio: ^5.4.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Rubik
      fonts: 
        - asset: assets/fonts/Rubik/Rubik-Regular.ttf
        - asset: assets/fonts/Rubik/Rubik-Bold.ttf
          weight: 700
        - asset: assets/fonts/Rubik/Rubik-Italic.ttf
          style: italic
flutter_native_splash:
  color: "#ffffff"
  color_dark: "#000000"

  image: assets/images/app_icon.png
  image_dark: assets/images/app_icon.png

  ios: true
  android: false